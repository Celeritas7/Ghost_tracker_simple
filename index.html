<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghost Assembly Tracker</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/**
 * Ghost Assembly Tracker — Styles
 * ================================
 * 
 * SECTIONS:
 *  1. Variables & Reset
 *  2. Login
 *  3. User Bar & Nav
 *  4. Search Screen
 *  5. Result Header & Trace Path
 *  6. Compliance Bar
 *  7. Sections & Field Rows
 *  8. Card Grid (Layout B)
 *  9. Edit Screen
 * 10. Settings (ECN/Compliance)
 * 11. ECN Sub-sections
 * 12. Bulk Edit
 * 13. Toast & Animations
 * 14. Debug
 */

/* ===== 1. VARIABLES & RESET ===== */
:root{--bg:#0a0b12;--card:#0d0e18;--inp:#12131e;--bd:#1e2130;--bd2:#2a2d3e;--t1:#e2e4ed;--t2:#8b8fa7;--t3:#6b7094;--t4:#4d5070;--t5:#3d4060;--t6:#2d3050;--ac:#5b6eea;--ac2:#7c5cf6;--grn:#34d399;--red:#f87171;--yel:#fbbf24;--blu:#38bdf8;--org:#fb923c;--pur:#a78bfa;--fm:'Courier New',monospace;--fb:'Segoe UI',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ===== 2. LOGIN ===== */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 30%,rgba(91,110,234,.1) 0%,transparent 70%)}
.login-card{position:relative;z-index:1;width:100%;max-width:380px;text-align:center}
.logo{width:80px;height:80px;border-radius:24px;margin:0 auto 24px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 12px 48px rgba(91,110,234,.3)}
.login-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.login-sub{color:var(--t3);font-size:14px;margin-bottom:32px;line-height:1.5}
.g-btn{width:100%;padding:16px 24px;border-radius:14px;border:none;background:#4285f4;color:#fff;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--fb)}
.g-btn:hover{background:#3367d6}
.g-btn svg{width:20px;height:20px}
.divider{display:flex;align-items:center;margin:20px 0;color:var(--t5);font-size:12px}.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd);margin:0 12px}
.login-err{margin-top:16px;padding:12px 16px;border-radius:10px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);font-size:13px;line-height:1.5;display:none;white-space:pre-line}

/* ===== 3. USER BAR & NAV ===== */
.ubar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--card);border-bottom:1px solid #14152a}
.uname{color:var(--t2);font-size:13px}
.ubadge{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;font-weight:600}
.ubadge-a{background:rgba(91,110,234,.15);color:var(--ac)}.ubadge-t{background:rgba(167,139,250,.15);color:var(--pur)}
.logout{background:none;border:1px solid var(--bd);color:var(--t3);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--fb)}
.logout:hover{border-color:var(--red);color:var(--red)}
.ld-screen{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.ld-spin{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:28px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.8}}
.ld-bar-w{width:200px;height:3px;border-radius:2px;background:var(--bd);overflow:hidden}.ld-bar{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.sch-screen{min-height:100vh;display:flex;flex-direction:column}
.sch-bg{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 20%,rgba(91,110,234,.06) 0%,transparent 70%)}
.sch-c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.sch-in{width:100%;padding:15px 18px;border-radius:14px;border:1px solid var(--bd);background:var(--inp);color:var(--t1);font-size:16px;font-family:var(--fm);outline:none;transition:all .2s}
.sch-in:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(91,110,234,.12)}
.sch-in::placeholder{color:var(--t4)}
.pp{width:100%;max-width:400px;padding:8px 14px;border-radius:10px;background:rgba(91,110,234,.06);border:1px solid rgba(91,110,234,.12);margin-bottom:16px;display:flex;align-items:center;gap:8px;font-size:12px}
.br{display:flex;gap:10px;width:100%;max-width:400px}
.btn{flex:1;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.btn1{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 4px 20px rgba(91,110,234,.25)}
.btn2{border:1px solid var(--bd);background:var(--inp);color:var(--t1)}
.btn2:hover{border-color:var(--ac)}
.ds{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:6px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);color:var(--grn)}
.ds-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:bl 2s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.fbox{margin-top:32px;width:100%;max-width:400px;padding:16px;border-radius:12px;background:var(--card);border:1px solid #14152a}
.fbox-t{font-size:11px;color:var(--t5);font-weight:600;margin-bottom:10px;letter-spacing:1px}
.frow{display:flex;align-items:center;gap:10px;padding:6px 0}
.ftag{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600}
.ftag-q{background:rgba(91,110,234,.12);color:var(--ac)}.ftag-t{background:rgba(251,191,36,.12);color:var(--yel)}
.fcode{font-size:12px;color:var(--t2);font-family:var(--fm)}.fdesc{font-size:11px;color:var(--t5);margin-left:auto}
.demo-s{margin-top:20px;text-align:center}.demo-l{font-size:11px;color:var(--t6);margin-bottom:8px}
.demo-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:400px}
.demo-c{padding:5px 10px;border-radius:6px;border:1px solid #14152a;background:var(--card);color:var(--t3);font-size:11px;font-family:var(--fm);cursor:pointer}.demo-c:hover{border-color:var(--ac);color:var(--ac)}

/* ===== 5. RESULT HEADER & TRACE PATH ===== */
.rh{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #14152a;background:var(--card);position:sticky;top:0;z-index:100}
.rbk{background:none;border:none;color:var(--ac);font-size:11px;cursor:pointer;padding:4px 6px;font-family:var(--fb)}
.rid{flex:1;text-align:center;font-size:12px;font-weight:700;font-family:var(--fm)}
.rlive{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;background:rgba(52,211,153,.1);color:var(--grn)}
.tbox{margin:4px 12px;padding:5px 10px;border-radius:6px;background:rgba(91,110,234,.04);border:1px solid rgba(91,110,234,.1)}
.tbox-t{display:none}
.tsteps{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.tstep{padding:1px 6px;border-radius:4px;font-size:10px}
.tstep0{background:rgba(91,110,234,.15);color:var(--ac);font-weight:600}
.tstepN{background:rgba(255,255,255,.03);color:var(--t3)}
.tarr{color:var(--t6);font-size:9px}
.tsum{font-size:9px;color:var(--t4);margin-top:2px}.thl{color:var(--ac);font-family:var(--fm)}.thl2{color:var(--t2);font-family:var(--fm)}

/* ===== 7. SECTIONS & FIELD ROWS ===== */
.sw{padding:2px 10px 80px}
.sc{margin-bottom:4px}
.sh{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer}
.si{font-size:16px;line-height:1}
.sinfo{flex:1;min-width:0}.slbl{font-size:12px;font-weight:600}.ssn{font-size:9px;color:var(--t3);margin-top:0;font-family:var(--fm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mbdg{padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600}
.schv{font-size:11px;color:var(--t5);transition:transform .2s}.schvO{transform:rotate(180deg)}
.fg{padding-top:2px;padding-bottom:2px}

/* ===== 8. CARD GRID (LAYOUT B) ===== */
.cg-sn{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:5px}
.cg-prod{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:5px}
.cg-card{padding:4px 7px;border-radius:5px;background:var(--inp);border:1px solid var(--bd);cursor:pointer;transition:border-color .1s}
.cg-card:hover{border-color:var(--bd2)}
.cg-card-warn{border-color:rgba(248,113,113,.3)!important;background:rgba(248,113,113,.03)!important}
.cg-lbl{font-size:8px;color:var(--t4);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:3px}
.cg-val{font-size:10px;font-family:var(--fm);color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cg-val-sn{color:var(--t1);font-weight:600}
.cg-val-empty{color:var(--t5)}
.cg-chks{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}
.cg-chk{padding:3px 7px;border-radius:5px;display:flex;align-items:center;gap:4px;cursor:pointer;transition:border-color .1s}
.cg-chk:hover{filter:brightness(1.1)}
.cg-grp{font-size:8px;font-weight:700;letter-spacing:.5px;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.cg-ecn-wrap{display:flex;gap:3px;flex-wrap:wrap}
.cg-ecn{padding:3px 6px;border-radius:5px;display:flex;align-items:center;gap:4px;background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.1);cursor:pointer}
.cg-ecn:hover{border-color:rgba(167,139,250,.2)}
.fgl{padding:2px 10px;font-size:10px;font-weight:600;opacity:.7;font-family:var(--fm)}
.fr{display:flex;justify-content:space-between;align-items:center;padding:2px 10px;cursor:pointer;border-radius:0;border-left:2px solid transparent;margin:0}
.fr:hover{background:rgba(255,255,255,.03)}
.frH{background:rgba(91,110,234,.08);border-left-color:var(--ac)}
.fl{display:flex;align-items:center;gap:4px;min-width:0;flex:1}
.flbl{font-size:11px;color:var(--t3);flex-shrink:0}
.frt{display:flex;align-items:center;gap:4px}
.fv{font-size:11px;color:var(--t2);text-align:right;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fvsn{color:var(--t1);font-family:var(--fm);font-weight:600}
.fei{font-size:9px;color:var(--t5)}
.ib{font-size:8px;padding:0px 4px;border-radius:3px;font-weight:600;flex-shrink:0}
.ib-l{background:rgba(91,110,234,.12);color:var(--ac)}.ib-c{background:rgba(251,191,36,.12);color:var(--yel)}.ib-d{background:rgba(56,189,248,.12);color:var(--blu)}
.ckd{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px}
.ckP{background:rgba(52,211,153,.15);border:1.5px solid var(--grn);color:var(--grn)}
.ckF{background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.35);color:var(--red)}

/* ===== 9. EDIT SCREEN ===== */
.escreen{min-height:100vh;display:flex;flex-direction:column}
.eh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #14152a;background:var(--card)}
.ecn{background:none;border:none;color:var(--red);font-size:13px;cursor:pointer;padding:6px 10px;font-family:var(--fb)}
.esv{background:none;border:none;color:var(--ac);font-size:13px;cursor:pointer;padding:6px 10px;font-weight:600;font-family:var(--fb)}
.ebody{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 24px 24px}
.eold{padding:8px 16px;border-radius:8px;margin-bottom:24px;background:rgba(248,113,113,.04);border:1px solid rgba(248,113,113,.1);font-family:var(--fm);font-size:13px;color:var(--red);text-decoration:line-through;opacity:.5;width:100%;max-width:380px;text-align:center}
.etin{width:100%;padding:16px 18px;border-radius:12px;border:2px solid var(--ac);background:var(--inp);color:var(--t1);font-size:18px;font-family:var(--fm);font-weight:600;outline:none;text-align:center;box-shadow:0 0 0 4px rgba(91,110,234,.1)}
.edin{width:100%;padding:16px 18px;border-radius:12px;border:2px solid var(--blu);background:var(--inp);color:var(--t1);font-size:18px;font-family:var(--fm);font-weight:600;outline:none;text-align:center;box-shadow:0 0 0 4px rgba(56,189,248,.1);color-scheme:dark}
.dqb{display:flex;gap:8px;margin-top:12px}.dqbb{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd);background:var(--inp);color:var(--blu);font-size:13px;cursor:pointer;font-family:var(--fb)}
.do{padding:12px 16px;border-radius:10px;cursor:pointer;border:1px solid var(--bd);background:var(--inp);display:flex;align-items:center;justify-content:space-between}.doS{border:2px solid var(--ac);background:rgba(91,110,234,.1)}
.doi{display:flex;align-items:center;gap:10px}
.dor{width:20px;height:20px;border-radius:10px;border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center}.dorS{border-color:var(--ac)}
.dorD{width:10px;height:10px;border-radius:5px;background:var(--ac)}
.dot{font-size:14px;font-family:var(--fm);font-weight:500;color:var(--t2)}.dotS{color:var(--t1)}
.doCur{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(251,191,36,.1);color:var(--yel);font-weight:600}
.savb{margin-top:28px;padding:14px 40px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.savA{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 4px 20px rgba(91,110,234,.2)}
.savI{background:var(--bd);color:var(--t4);cursor:default}

/* ===== 13. TOAST & ANIMATIONS ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:90vw;word-break:break-all;font-family:var(--fm)}
.toast-s{background:#121e16;border:1px solid rgba(52,211,153,.2);color:var(--grn)}
.toast-e{background:#1e1214;border:1px solid rgba(248,113,113,.2);color:var(--red)}
.rfb{position:fixed;bottom:20px;right:20px;z-index:100;width:48px;height:48px;border-radius:14px;border:1px solid var(--bd);background:var(--card);color:var(--t3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.rfb:hover{border-color:var(--ac);color:var(--ac)}
.rfS{animation:spin 1s linear infinite}@keyframes spin{100%{transform:rotate(360deg)}}
.dbg{margin:12px 16px;padding:14px;border-radius:10px;background:var(--inp);border:1px solid var(--bd);font-size:11px;line-height:1.7;max-height:400px;overflow-y:auto;font-family:var(--fm);color:var(--t3)}
.dbg b{color:var(--yel)}.dbg code{color:var(--ac);background:rgba(91,110,234,.08);padding:1px 4px;border-radius:3px}

/* ===== 14. DEBUG ===== */
.dbgbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--yel);background:transparent;color:var(--yel);font-size:11px;cursor:pointer;font-family:var(--fb);margin-left:8px}
.err-b{margin:16px;padding:16px;border-radius:12px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);color:var(--red);font-size:13px;line-height:1.5}
.err-b code{display:block;margin-top:8px;padding:8px 12px;border-radius:8px;background:rgba(248,113,113,.05);font-family:var(--fm);font-size:11px;word-break:break-all;color:var(--t2)}
/* ECN Settings button */

/* ===== 10. SETTINGS BUTTONS ===== */
.ecnbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--ac);background:transparent;color:var(--ac);font-size:11px;cursor:pointer;font-family:var(--fb);font-weight:600;transition:all .15s}
.ecnbtn:active{background:var(--ac);color:#fff}
/* ECN Settings page */

/* ===== 10b. SETTINGS PAGE ===== */
.ecns-sec{margin-bottom:8px;border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.ecns-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--inp);cursor:pointer}
.ecns-body{background:var(--card);padding:4px 0}
.ecns-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s}
.ecns-row:active{background:rgba(91,110,234,.06)}
.ecns-tog{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s}
.ecns-on{background:var(--ac);color:#fff;border:2px solid var(--ac)}
.ecns-off{background:transparent;border:2px solid var(--bd2);color:transparent}
.ecns-fname{font-size:12px;color:var(--t2);font-family:var(--fm);word-break:break-all;line-height:1.4}
/* ECN sub-section in result cards */

/* ===== 11. ECN SUB-SECTIONS ===== */
.ecn-sub{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;border-top:1px dashed rgba(91,110,234,.15)}
.ecn-sub-icon{font-size:11px}
.ecn-sub-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--ac)}
.ecn-sub-body{border-top:1px solid var(--bd)}
.ecn-flbl{font-size:11px!important;color:var(--t4)!important}
/* Chip grid */
.chipgrid{display:flex;flex-wrap:wrap;gap:6px}
.uchip{display:flex;align-items:center;gap:4px;padding:8px 10px;border-radius:10px;border:1.5px solid var(--bd);background:var(--inp);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent}
.uchip:active{transform:scale(.95)}
.uchip-on{border-width:2px}
.uchip-i{font-size:14px}
.uchip-l{font-size:11px;font-weight:600;color:var(--t2);font-family:var(--fb)}
.uchip-on .uchip-l{color:inherit}
.btn3{flex:1;padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--inp);color:var(--t3);font-family:var(--fb);transition:all .15s}
.btn3:active{background:var(--bd)}
/* Compliance indicators */
.fr-warn{background:rgba(248,113,113,.04)!important;border-left:2px solid var(--red)!important}
.comp-tag{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(248,113,113,.1);color:var(--red);font-weight:600;letter-spacing:.3px;white-space:nowrap}
.comp-badge{padding:1px 6px;border-radius:4px;background:rgba(248,113,113,.12);color:var(--red);font-size:9px;font-weight:700;margin-left:auto;white-space:nowrap}
/* Compliance settings page */
.comp-sec{margin-bottom:8px;border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.comp-sec-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--inp);cursor:pointer}
.comp-sec-body{background:var(--card);padding:4px 0}
.comp-row{display:flex;align-items:center;gap:10px;padding:8px 14px}
.comp-fname{font-size:12px;color:var(--t2);font-family:var(--fm);min-width:120px;flex-shrink:0}
.comp-input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--bd);background:var(--inp);color:var(--t1);font-family:var(--fm);font-size:13px;outline:none}
.comp-input:focus{border-color:var(--ac)}
/* Bulk edit */
.bulk-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--grn);background:rgba(52,211,153,.06);color:var(--grn);font-size:11px;cursor:pointer;font-family:var(--fb);font-weight:600;transition:all .15s}
.bulk-btn:active{background:var(--grn);color:#fff}

/* ===== 12. BULK EDIT ===== */
.bulk-step{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;border-radius:10px;background:rgba(91,110,234,.06);border:1px solid rgba(91,110,234,.12)}

// Detect if a column name is an ECN field
function isECNField(f){
  if(/^(GP-)?ECN-/.test(f))return true;
  if(f.includes('ECN')&&!/ECB/.test(f))return true;
  if(/^(i55|i61|i64|issue\d|RCM)/.test(f))return true;

}

function isFieldEditable(dk,f){

  if(DISABLED_FIELDS[dk]&&DISABLED_FIELDS[dk].has(f))return false;
  // Explicitly enabled → editable
  if(EDIT_FIELDS[dk]&&EDIT_FIELDS[dk].has(f))return true;

  if(isECNField(f)&&ECN_SETTINGS[dk]&&ECN_SETTINGS[dk].has(f))return true;

  const sk=Object.entries(SK_TO_DK).find(([k,v])=>v===dk)?.[0]||dk;

  return false;
}
function togEditField(dk,f){
  if(!EDIT_FIELDS[dk])EDIT_FIELDS[dk]=new Set();
  if(!DISABLED_FIELDS[dk])DISABLED_FIELDS[dk]=new Set();

  if(isFieldEditable(dk,f)){

    EDIT_FIELDS[dk].delete(f);

    if(isECNField(f)&&ECN_SETTINGS[dk])ECN_SETTINGS[dk].delete(f);

let COMP_RULES={latestFW:{},requiredChecks:{},requiredFields:{},requiredECN:{},exactMatch:{},multiMatch:{},dateFresh:{}};

// Check a single field for compliance. Returns null (ok) or string (reason)
function checkFieldComp(dataKey,field,value){
  const v=(value||'').trim();
  // Latest FW check - match field name partially
  // Skip if value looks like a boolean (field used as checkbox in this sheet, not a FW version)
  for(const[fwField,latest]of Object.entries(COMP_RULES.latestFW||{})){
    if(field===fwField||field.startsWith(fwField)){
      if(/^(TRUE|FALSE|true|false|1|0)$/i.test(v))break; // boolean value = not a FW field here
      if(!v)return'empty';
      if(v!==latest)return`not latest (${latest})`;
      return null;
    }
  }
  // Exact match — field must equal a specific value
  const em=COMP_RULES.exactMatch?.[dataKey]||{};
  if(em[field]!==undefined){
    if(!v)return'empty';
    if(v!==em[field])return`expected: ${em[field]}`;
    return null;
  }
  // Multi match — field must be one of several acceptable values
  const mm=COMP_RULES.multiMatch?.[dataKey]||{};
  if(mm[field]&&Array.isArray(mm[field])&&mm[field].length){
    if(!v)return'empty';
    if(!mm[field].includes(v))return`not in: ${mm[field].join(' / ')}`;
    return null;
  }
  // Date freshness — date must be within N days of today
  const df=COMP_RULES.dateFresh?.[dataKey]||{};
  if(df[field]){
    if(!v)return'no date';
    const d=new Date(v.replace(/\//g,'-'));
    if(isNaN(d.getTime()))return'invalid date';
    const now=new Date();
    const diffDays=Math.floor((now-d)/(1000*60*60*24));
    if(diffDays>df[field])return`older than ${df[field]}d (${diffDays}d ago)`;
    return null;
  }
  // Required checkbox
  const reqC=COMP_RULES.requiredChecks?.[dataKey]||[];
  if(reqC.includes(field)){
    if(!/^(TRUE|true|1|OK|✓|done)$/i.test(v))return'not checked';
    return null;
  }
  // Required field
  const reqF=COMP_RULES.requiredFields?.[dataKey]||[];
  if(reqF.includes(field)){
    if(!v)return'required';
    return null;
  }
  // Required ECN — any non-empty value means applied (dates, text, TRUE all count)
  const reqE=COMP_RULES.requiredECN?.[dataKey]||[];
  if(reqE.includes(field)){
    if(!v)return'ECN not applied';
    return null;
  }
  return null;
}

// Check all fields in a section, return count of issues (including ECN)
function countSectionIssues(dataKey,items){
  if(!items||!items.length)return 0;
  let issues=0;
  items.forEach(item=>{
    Object.entries(item).forEach(([k,v])=>{
      if(k==='_rowIdx')return;
      if(checkFieldComp(dataKey,k,v))issues++;
    });
  });
  return issues;
}

function parseInput(raw){const i=raw.trim();if(!i)return null;const f=i.match(/^GT\d{3}-([A-Z0-9]{2,3})-(\d{3,5})$/i);if(f){const c=f[1].toUpperCase(),n=parseInt(f[2]),a=ASSEMBLY_CODES[c];if(a)return{...a,num:n,fullSN:i.toUpperCase(),inputType:'qr'};}if(/^\d{5,6}$/.test(i))return{type:'galina',label:'GALINA',num:parseInt(i),fullSN:i,inputType:'manual'};const s=i.match(/^([A-Z]{2,6})[- ]?(\d+)$/i);if(s){const p=s[1].toUpperCase(),n=parseInt(s[2]),c=SHORTHAND_MAP[p];if(c&&ASSEMBLY_CODES[c])return{...ASSEMBLY_CODES[c],num:n,fullSN:`${p}-${n}`,inputType:'shorthand'};if(['PDB','IOB','MDB','BRK','BAT'].includes(p))return{type:p.toLowerCase(),label:p,num:n,fullSN:`${p}-${n}`,inputType:'shorthand'};}return null;}

function shouldSkipField(f){if(f==='#'||f==='_rowIdx')return true;if(/^\d+$/.test(f))return true;if(/^(共通|特定)$/.test(f))return true;if(/^\d+\.\d+\.\d+/.test(f))return true;if(f.startsWith('__'))return true;if(/^(ACT|ecn-)/.test(f))return true;

function getV(s,f){
  let v=V[`${s}.${f}`];if(v)return v;
  // Partial match: "IOB FW 2.0.0.0" → match "IOB FW", "PDB FW 2.0.0.0" → match "PDB FW"
  for(const[k,val]of Object.entries(V)){const[ks,kf]=k.split('.',2);if(ks===s&&f.startsWith(kf))return val;}
  // Common patterns across sections
  if(f==='使用')return{type:'dropdown',options:USAGE_OPTS};
  if(f==='完了日'||f.includes('完了'))return{type:'date'};
  if(f==='enc')return{type:'checkbox'};
  if(f==='完了'||f==='梱包完了')return{type:'dropdown',options:DONE_OPTS};
  // FW fields fallback
  if(/FW/i.test(f)&&/MDB/.test(f))return{type:'dropdown',options:MDB_FW};
  if(/FW/i.test(f)&&/IOB/.test(f))return{type:'dropdown',options:IOB_FW_HB};
  if(/FW/i.test(f)&&/PDB/.test(f))return{type:'dropdown',options:PDB_FW};
  // ECN fields — detect type from actual data values
  if(isECNField(f)){return guessECNType(s,f);}
  return null;
}

// Detect ECN field type by scanning actual values in data
function guessECNType(section,field){
  const lk=SK_TO_DK[section]||section;
  const rows=DATA[lk];
  if(!rows||!rows.length)return{type:'checkbox'};
  let bools=0,dates=0,texts=0;
  rows.forEach(r=>{
    const v=(r[field]||'').trim();if(!v)return;
    if(/^(TRUE|FALSE|true|false|1|0|OK|✓|✗|done|no)$/i.test(v))bools++;
    else if(/^\d{4}[\/-]\d{2}[\/-]\d{2}$/.test(v)||/^\d{2}[\/-]\d{2}[\/-]\d{4}$/.test(v))dates++;
    else texts++;
  });
  if(dates>bools&&dates>=texts)return{type:'date'};
  if(texts>bools&&texts>dates)return null; // free text
  return{type:'checkbox'};
}

let DATA={},LOADING=false;
let SHEET_META={}; // {key: {headers:[], startRow:number, tabName:string, sheetId:number}}
let SHEET_IDS={}; // {tabName: numericSheetId}

async function loadSheetIds(){
  try{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}?fields=sheets.properties`;
    const r=await fetch(url,{headers:{'Authorization':`Bearer ${accessToken}`}});
    if(!r.ok)return;
    const j=await r.json();
    (j.sheets||[]).forEach(s=>{
      if(s.properties)SHEET_IDS[s.properties.title]=s.properties.sheetId;
    });
    console.log('[Sheets] Tab IDs:',SHEET_IDS);
  }catch(e){console.warn('[Sheets] Failed to load sheet IDs:',e);}
}

async function loadAllData(onP){LOADING=true;const E=Object.entries(CONFIG.TABS);const T=E.length;let L=0;const errs=[];

  function parseSheet(raw,key,tabName){
    if(raw.length<2)return[];
    let hdr=raw[0];let startRow=1;
    // Detect multi-row headers: if row 1 has many empty cells, combine with row 2
    const emptyCount=hdr.filter(h=>!h||!h.trim()).length;
    const totalCols=Math.max(hdr.length,raw.length>1?raw[1].length:0);
    if(totalCols>5 && emptyCount/totalCols>0.3 && raw.length>2){
      // Merge row 1 + row 2: prefer row 2 value, fall back to row 1
      const row2=raw[1]||[];
      const merged=[];
      for(let ci=0;ci<totalCols;ci++){
        const h1=(hdr[ci]||'').trim();
        const h2=(row2[ci]||'').trim();
        merged[ci]=h2||h1; // prefer row 2 (actual col names) over row 1 (group headers)
      }
      hdr=merged;startRow=2;
    }
    // Handle duplicate column names by appending _2, _3 etc
    const seen={};
    hdr=hdr.map(h=>{if(!h)return h;if(!seen[h]){seen[h]=1;return h;}seen[h]++;return`${h}_${seen[h]}`;});
    // Store metadata for write-back
    SHEET_META[key]={headers:[...hdr],startRow,tabName};
    return raw.slice(startRow).map((row,ri)=>{const o={_rowIdx:ri};let has=false;
      hdr.forEach((c,ci)=>{if(c){const v=row[ci]!=null?String(row[ci]):'';o[c]=v;if(v)has=true;}});
      return has?o:null;}).filter(Boolean);
  }

  try{const R=E.map(([,t])=>encodeURIComponent(t));const url=`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values:batchGet?${R.map(r=>`ranges=${r}`).join('&')}`;onP?.(0,T,'Fetching...');
    const resp=await fetch(url,{headers:{'Authorization':`Bearer ${accessToken}`}});if(!resp.ok)throw new Error(`HTTP ${resp.status}`);const j=await resp.json();
    (j.valueRanges||[]).forEach((vr,i)=>{const[key]=E[i];const raw=vr.values||[];DATA[key]=parseSheet(raw,key,E[i][1]);L++;onP?.(L,T,E[i][1]);});
  }catch(e){console.warn('Batch failed:',e);for(const[key,tab]of E){try{onP?.(L,T,tab);const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(tab)}`,{headers:{'Authorization':`Bearer ${accessToken}`}});if(!r.ok)throw new Error(`HTTP ${r.status}`);const j=await r.json();const raw=j.values||[];DATA[key]=parseSheet(raw,key,tab);L++;}catch(er){errs.push({tab,error:er.message});DATA[key]=[];L++;}}}
  LOADING=false;onP?.(T,T,'Done');
  // Map numeric sheet IDs into SHEET_META
  Object.values(SHEET_META).forEach(m=>{
    const tabBase=m.tabName.replace(/!.*$/,''); // strip any range suffix
    if(SHEET_IDS[tabBase]!==undefined)m.sheetId=SHEET_IDS[tabBase];
  });
  buildDebugInfo();return errs;}

// ===== FLEXIBLE COLUMN MATCHING =====
function getSNField(rows){if(!rows||!rows.length)return'S/N';const K=Object.keys(rows[0]);const k=K.find(k=>/^S\/?N$/i.test(k.trim()));if(k)return k;for(const k2 of K){if(rows.some(r=>/^GT\d{3}-[A-Z0-9]{2,3}-\d{3,5}$/i.test(r[k2]||'')))return k2;}return K.find(k=>!shouldSkipField(k))||K[0];}
function getRowSN(row,list){return(row[getSNField(list||[row])]||'').trim();}

// getCol: flexibly find a value from a row using multiple possible column name keywords
function getCol(row,...keywords){if(!row)return'';const K=Object.keys(row);
  for(const kw of keywords){if(row[kw]!==undefined&&row[kw]!=='')return row[kw];}
  for(const kw of keywords){const kwN=kw.toLowerCase().replace(/[\s_\-\/&]/g,'');for(const k of K){const kN=k.toLowerCase().replace(/[\s_\-\/&]/g,'');if(kN===kwN&&row[k]!=='')return row[k];}}
  for(const kw of keywords){const kwL=kw.toLowerCase();for(const k of K){if(k.toLowerCase().includes(kwL)&&row[k]!=='')return row[k];}}
  return'';}

function findRowBySN(list,snVal){if(!list||!snVal)return null;const up=String(snVal).toUpperCase().trim();if(!up)return null;const sf=getSNField(list);let r=list.find(r=>(r[sf]||'').toUpperCase().trim()===up);if(r)return r;
  const K=Object.keys(list[0]||{});const snK=K.filter(k=>/s[\s\/]?n/i.test(k));for(const k of snK){r=list.find(r=>(r[k]||'').toUpperCase().trim()===up);if(r)return r;}return null;}

function findRowByCol(list,colKWs,val){if(!list||!val)return null;const up=val.toUpperCase().trim();for(const row of list){const v=getCol(row,...colKWs);if(v&&v.toUpperCase().trim()===up)return row;}return null;}

function findByNum(col,num){if(!col)return null;const f=getSNField(col);return col.find(i=>{const m=(i[f]||'').match(/(\d+)$/);return m&&parseInt(m[1])===num;});}

  for(const g of DATA.ghosts){if(Object.values(g).some(v=>v&&v.toUpperCase().trim()===up))return g;}
  return null;}

async function handleSession(session){
  if(!session){S.screen='login';render();return;}
  const email=session.user?.email;
  if(!email){S.screen='login';render();return;}

  // Look up user in shared authentication_mode_user_roles table
  try{
    const{data:userRow,error}=await sb
      .from('authentication_mode_user_roles')
      .select('name,role')
      .eq('email',email)
      .single();

    if(error||!userRow){
      const el=$('#loginErr');
      if(el){el.textContent=`Access denied.\n${email} not in approved users.`;el.style.display='block';}
      await sb.auth.signOut();
      S.screen='login';render();return;
    }

    // Map role → app permissions
    // admin = full access (settings, batch, edit)
    // operator = can edit fields, no settings
    // viewer = read-only
    currentUser={
      name:userRow.name||email.split('@')[0],
      email,
      team:'production',
      isAdmin:userRow.role==='admin',
      isOperator:userRow.role==='operator',
      isGuest:userRow.role==='viewer',
      role:userRow.role
    };
    console.log('[Auth] Session valid for',email,'role:',userRow.role);
  }catch(e){
    console.error('[Auth] User lookup failed:',e);
    const el=$('#loginErr');
    if(el){el.textContent='Auth error: '+e.message;el.style.display='block';}
    await sb.auth.signOut();
    S.screen='login';render();return;
  }

  // Init GIS for Sheets API access (separate from Supabase auth)
  initGISForSheets();
}

function initGISForSheets(){
  if(typeof google==='undefined'||!google.accounts){setTimeout(initGISForSheets,200);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CONFIG.CLIENT_ID,
    scope:CONFIG.SCOPES,
    callback:r=>{
      if(r.access_token){
        accessToken=r.access_token;
        localStorage.setItem('gat',accessToken);
        console.log('[GIS] Got Sheets access token');
        startApp();
      }
    }
  });
  // Check for cached token
  const cachedToken=localStorage.getItem('gat');
  if(cachedToken){
    accessToken=cachedToken;
    // Validate cached token
    fetch('https://www.googleapis.com/oauth2/v1/tokeninfo?access_token='+cachedToken)
      .then(r=>{if(r.ok){console.log('[GIS] Cached token valid');startApp();}
        else{console.log('[GIS] Cached token expired');localStorage.removeItem('gat');accessToken=null;tokenClient.requestAccessToken({prompt:''});}})
      .catch(()=>{localStorage.removeItem('gat');accessToken=null;tokenClient.requestAccessToken({prompt:''});});
  } else {
    // No cached token — request one (shows Google popup if needed)
    tokenClient.requestAccessToken({prompt:''});
  }
}

function doLogout(){
  // Revoke GIS token
  if(accessToken)try{google.accounts.oauth2.revoke(accessToken);}catch{}
  accessToken=null;
  localStorage.removeItem('gat');
  // Sign out of Supabase
  if(sb)sb.auth.signOut();
  currentUser={name:'',email:'',isAdmin:false,isOperator:false,isGuest:false,team:'',role:''};
  S.screen='login';render();
}

async function startApp(){S.screen='loading';render();

// Compliance progress bar
function rCompBar(allSecs){
  const lkMap=SK_TO_DK;
  let totalChecked=0,totalIssues=0;
  allSecs.forEach(({k,d})=>{
    if(!d)return;const items=Array.isArray(d)?d:[d];if(!items.length)return;
    const dk=lkMap[k]||k;
    items.forEach(item=>{
      Object.entries(item).forEach(([field,val])=>{
        if(field==='_rowIdx')return;
        const issue=checkFieldComp(dk,field,val);
        if(issue!==null){totalChecked++;totalIssues++;}
        else{
          // Count non-null rules that passed
          const hasRule=COMP_RULES.latestFW?.[field]||
            (COMP_RULES.requiredChecks?.[dk]||[]).includes(field)||
            (COMP_RULES.requiredFields?.[dk]||[]).includes(field)||
            (COMP_RULES.requiredECN?.[dk]||[]).includes(field)||
            (COMP_RULES.exactMatch?.[dk]||{})[field]!==undefined||
            (COMP_RULES.multiMatch?.[dk]||{})[field]!==undefined||
            (COMP_RULES.dateFresh?.[dk]||{})[field]!==undefined;
          // Check partial FW match
          const hasFWRule=Object.keys(COMP_RULES.latestFW||{}).some(fw=>field===fw||field.startsWith(fw));
          if(hasRule||hasFWRule)totalChecked++;
        }
      });
    });
  });
  if(!totalChecked)return'';
  const passed=totalChecked-totalIssues;
  const pct=Math.round((passed/totalChecked)*100);
  const color=pct===100?'var(--grn)':pct>=70?'var(--yel)':'var(--red)';
  return`<div class="comp-bar">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:9px;font-weight:600;letter-spacing:1px;color:var(--t5)">COMPLIANCE</span>
      <div class="comp-bar-track" style="flex:1"><div class="comp-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span style="font-size:11px;font-weight:700;color:${color}">${pct}%</span>
      <span style="font-size:9px;color:var(--t4)">${passed}/${totalChecked}</span>
      ${totalIssues?`<span style="font-size:9px;color:var(--red)">${totalIssues}⚠</span>`:''}
    </div>
  </div>`;
}

}

function startEdit(sec,sn,field,value){
  S.editing={section:sec,sn,field,value,_from:S.screen};
  const val=getV(sec,field);
  const dk=SK_TO_DK[sec]||sec;

  // Check if compliance rule dictates the input type
  const ruleInfo=getFieldRuleType(dk,field);
  let effectiveType=val?.type;

  if(ruleInfo.type==='date_fresh'){
    effectiveType='date';
  } else if(ruleInfo.type==='checkbox'){
    effectiveType='checkbox';
  } else if(ruleInfo.type==='exact'||ruleInfo.type==='multi'||ruleInfo.type==='fw'){
    effectiveType=null; // free text input
  } else if(isECNField(field)){
    // Fallback: detect type from actual value
    const v=(value||'').trim();
    if(/^(TRUE|FALSE|true|false|1|0|OK|✓|✗|done|no)$/i.test(v))effectiveType='checkbox';
    else if(/^\d{4}[\/-]\d{2}[\/-]\d{2}$/.test(v)||/^\d{2}[\/-]\d{2}[\/-]\d{4}$/.test(v))effectiveType='date';
    else if(!v)effectiveType=val?.type||'checkbox';
    else effectiveType=null;
  }
  S.editing._effectiveType=effectiveType;

  // Normalize checkbox values to ✓/✗ for the toggle UI
  if(effectiveType==='checkbox'){
    const isPass=/^(TRUE|true|1|OK|✓|done)$/i.test((value||'').trim());
    S.editValue=isPass?'✓':'✗';
    S.editing.value=isPass?'✓':'✗';
  }else{S.editValue=value||'';}
  S.screen='edit';render();
}

// Detect if a field is a S/N (serial number) field that should get exchange notes
function isSNField(field){
  const f=(field||'').toLowerCase();
  return f.includes('s/n')||f.includes('sn')||f==='serial'||/シリアル/.test(field);
}

// Add or append a note to a Google Sheet cell
async function addCellNote(dataKey,rowIdx,colIdx,noteText){
  const meta=SHEET_META[dataKey];if(!meta)return;
  const tabName=meta.tabName.replace(/!.*$/,'');
  const sheetId=meta.sheetId??SHEET_IDS[tabName];
  if(sheetId===undefined){console.warn('[Comment] No sheetId for',tabName);return;}
  const sheetRow=meta.startRow+1+rowIdx;

  function colLetter(n){let s='';while(n>=0){s=String.fromCharCode(65+(n%26))+s;n=Math.floor(n/26)-1;}return s;}
  const col=colLetter(colIdx);
  const cellA1=col+sheetRow;

  // Google Drive Comments API v3 — anchor to specific cell
  try{
    const url=`https://www.googleapis.com/drive/v3/files/${CONFIG.SHEET_ID}/comments?fields=id,content,author,anchor`;
    // Anchor format for Google Sheets cells
    const anchor=JSON.stringify({type:'workbook-range',uid:sheetId,range:tabName+'!'+cellA1+':'+cellA1});
    const body={content:noteText,anchor};
    console.log('[Comment] POST',url);
    console.log('[Comment] body:',JSON.stringify(body));
    const r=await fetch(url,{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const txt=await r.text();
    console.log('[Comment] Response:',r.status,txt);
    if(r.ok){
      showToast('💬 Comment added','success');
    } else {
      console.warn('[Comment] Failed:',r.status,txt);
      showToast('Comment failed: '+r.status,'error');
    }
  }catch(e){
    console.warn('[Comment] Error:',e);
    showToast('Comment error: '+e.message,'error');
  }
}

async function saveEdit(){
  if(!S.editing||S.editValue===S.editing.value)return;
  const{section,sn,field}=S.editing;
  let newVal=S.editValue;
  const label=FIELD_LABELS[field]||field;

  // Convert checkbox display values to sheet values
  const fieldType=getV(section,field);
  if(fieldType?.type==='checkbox'){
    newVal=newVal==='✓'?'TRUE':'FALSE';
  }

  // Map section to DATA key
  const secToKey=SK_TO_DK;
  const dataKey=secToKey[section];
  if(!dataKey||!SHEET_META[dataKey]){showToast('Cannot find sheet metadata','error');return;}

  const meta=SHEET_META[dataKey];
  const rows=DATA[dataKey];
  if(!rows){showToast('No data loaded','error');return;}

  // Find the row by matching S/N
  const sf=getSNField(rows);
  const row=rows.find(r=>(r[sf]||'').toUpperCase().trim()===sn.toUpperCase().trim());
  if(!row){showToast('Row not found','error');return;}

  // Find column index from headers
  const colIdx=meta.headers.indexOf(field);
  if(colIdx===-1){showToast('Column not found','error');return;}

  // Calculate sheet cell reference using stored original row index
  // Sheet row = startRow (header rows) + 1 (1-indexed) + _rowIdx
  const sheetRow=meta.startRow+1+row._rowIdx;
  // Column letter (A=0, B=1, ..., Z=25, AA=26, ...)
  function colLetter(n){let s='';while(n>=0){s=String.fromCharCode(65+(n%26))+s;n=Math.floor(n/26)-1;}return s;}
  const colL=colLetter(colIdx);
  const cellRef=`${meta.tabName}!${colL}${sheetRow}`;

  // Show saving state
  showToast(`Saving ${label}...`);

  async function doSave(){
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${encodeURIComponent(cellRef)}?valueInputOption=USER_ENTERED`;
    return fetch(url,{
      method:'PUT',
      headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
      body:JSON.stringify({range:cellRef,majorDimension:'ROWS',values:[[newVal]]})
    });
  }

  function refreshToken(){
    return new Promise((resolve,reject)=>{
      if(!tokenClient){reject(new Error('No token client'));return;}
      const origCb=tokenClient.callback;
      let done=false;
      tokenClient.callback=r=>{
        if(done)return;done=true;
        tokenClient.callback=origCb;
        if(r.access_token){accessToken=r.access_token;localStorage.setItem('gat',accessToken);resolve();}
        else reject(new Error('Re-auth failed'));
      };
      tokenClient.requestAccessToken({prompt:''});
      setTimeout(()=>{if(!done){done=true;tokenClient.callback=origCb;reject(new Error('Re-auth timed out'));}},15000);
    });
  }

  try{
    let resp=await doSave();
    if(resp.status===401){
      showToast('Token expired, refreshing...');
      await refreshToken();
      resp=await doSave();
    }
    if(!resp.ok){const e=await resp.text().catch(()=>'');let msg=`HTTP ${resp.status}`;try{msg=JSON.parse(e).error?.message||msg;}catch{}throw new Error(msg);}

    // Update local data
    row[field]=newVal;

    // Auto-add exchange note for S/N fields
    const oldVal=S.editing.value;
    if(isSNField(field)&&oldVal&&oldVal!==newVal){
      const noteText=`${oldVal} → ${newVal}　交換`;
      showToast(`✓ ${noteText}`);
      addCellNote(dataKey,row._rowIdx,colIdx,noteText).then(()=>{
        console.log('[Comment] Exchange note added for',field);
      }).catch(e=>console.warn('[Comment] Failed:',e));
    } else if(oldVal&&oldVal!==newVal){
      showToast(`✓ ${label}: ${oldVal} → ${newVal}`);
    } else {
      showToast(`✓ ${label}: ${newVal}`);
    }

    S.screen=S.editing?._from||'result';S.editing=null;
    if(S.screen==='result'&&S.result?.ghost){S.tree=getGhostTree(S.result.ghost);}
    if(S.screen==='batch'){rebuildBatchTrees();}
    render();
  }catch(err){
    console.error('Save failed:',err);
    showToast(`Save failed: ${err.message}`,'error');
  }
}

// Bulk set rule type for all toggled-ON fields in a dk
function bulkSetRule(dk,type){
  const allFieldsAll=detectFieldsByKey();
  const normal=allFieldsAll[dk]||[];
  const ecn=getECNFields(dk);
  const all=[...normal,...ecn];
  const seen=new Set();
  const unique=all.filter(f=>{if(seen.has(f))return false;seen.add(f);return true;});
  const onFields=unique.filter(f=>isFieldEditable(dk,f));
  if(!onFields.length){showToast('No toggled-ON fields to update','error');return;}
  onFields.forEach(f=>setFieldRuleType(dk,f,type));
  showToast(`${onFields.length} fields → ${type==='none'?'cleared':type}`);
}

function rECNSubSection(sk,items,lk){
  const dk=SK_TO_DK[sk]||sk;
  const ecnFields=getECNFields(dk).filter(f=>isECNVisible(dk,f));
  if(!ecnFields.length)return'';
  const ecnKey='ecn_'+sk;
  const isOpen=S.expanded.has(ecnKey);
  const sf=getSNField(DATA[lk]||items);

  // Count ECN compliance issues
  let ecnIssues=0;
  items.forEach(item=>{ecnFields.forEach(f=>{if(checkFieldComp(dk,f,item[f]))ecnIssues++;});});
  const issueBadge=ecnIssues?`<span class="comp-badge" style="margin-left:auto">${ecnIssues} ⚠</span>`:'';

  let h=`<div class="ecn-sub" onclick="togSec('${ecnKey}')">
    <span class="ecn-sub-icon">🔧</span>
    <span class="ecn-sub-label">ECN (${ecnFields.length})</span>
    ${issueBadge}
    <span class="schv ${isOpen?'schvO':''}">▼</span>
  </div>`;
  if(isOpen){
    h+=`<div class="ecn-sub-body">`;
    items.forEach(item=>{
      ecnFields.forEach(f=>{
        const val=item[f]||'';
        const eid=regEdit(sk,item[sf]||'',f,val);
        const compIssue=checkFieldComp(dk,f,val);
        const compCls=compIssue?'fr-warn':'';
        const compTag=compIssue?`<span class="comp-tag">⚠ ${esc(compIssue)}</span>`:'';

        // Detect type from actual data
        const ruleI2=getFieldRuleType(dk,f);const fType=ruleI2.type==="date_fresh"?{type:"date"}:ruleI2.type==="checkbox"?{type:"checkbox"}:guessECNType(sk,f);
        let vH;
        if(fType?.type==='checkbox'){
          const p=/^(TRUE|true|1|OK|✓|done)$/i.test(val);
          const isF=/^(FALSE|false|0|✗|no)$/i.test(val);
          vH=p?'<span class="ckd ckP">✓</span>':(isF?'<span class="ckd ckF">✗</span>':`<span class="fv">${esc(val||'—')}</span>`);
        } else if(fType?.type==='date'){
          vH=`<span class="fv" style="color:var(--blu)">${esc(val||'—')}</span>`;
        } else {
          vH=`<span class="fv">${esc(val||'—')}</span>`;
        }

        h+=`<div class="fr ${compCls}" onclick="doEdit(${eid})"><div class="fl"><span class="flbl ecn-flbl">${esc(f)}</span>${compTag}</div><div class="frt">${vH}<span class="fei">✎</span></div></div>`;
      });
    });
    h+=`</div>`;
  }
  return h;
}


// Compliance settings actions
function setFWRule(field,val){
  if(!COMP_RULES.latestFW)COMP_RULES.latestFW={};
  if(val.trim())COMP_RULES.latestFW[field]=val.trim();
  else delete COMP_RULES.latestFW[field];
}
function togCompCheck(dk,f){
  if(!COMP_RULES.requiredChecks)COMP_RULES.requiredChecks={};
  if(!COMP_RULES.requiredChecks[dk])COMP_RULES.requiredChecks[dk]=[];
  const idx=COMP_RULES.requiredChecks[dk].indexOf(f);
  if(idx>=0)COMP_RULES.requiredChecks[dk].splice(idx,1);
  else COMP_RULES.requiredChecks[dk].push(f);
  render();
}
function togCompReq(dk,f){
  if(!COMP_RULES.requiredFields)COMP_RULES.requiredFields={};
  if(!COMP_RULES.requiredFields[dk])COMP_RULES.requiredFields[dk]=[];
  const idx=COMP_RULES.requiredFields[dk].indexOf(f);
  if(idx>=0)COMP_RULES.requiredFields[dk].splice(idx,1);
  else COMP_RULES.requiredFields[dk].push(f);
  render();
}
function togCompECN(dk,f){
  if(!COMP_RULES.requiredECN)COMP_RULES.requiredECN={};
  if(!COMP_RULES.requiredECN[dk])COMP_RULES.requiredECN[dk]=[];
  const idx=COMP_RULES.requiredECN[dk].indexOf(f);
  if(idx>=0)COMP_RULES.requiredECN[dk].splice(idx,1);
  else COMP_RULES.requiredECN[dk].push(f);
  render();
}
function setExactMatch(dk,f,val){
  if(!COMP_RULES.exactMatch)COMP_RULES.exactMatch={};
  if(!COMP_RULES.exactMatch[dk])COMP_RULES.exactMatch[dk]={};
  if(val.trim())COMP_RULES.exactMatch[dk][f]=val.trim();
  else delete COMP_RULES.exactMatch[dk][f];
}
function setMultiMatch(dk,f,val){
  if(!COMP_RULES.multiMatch)COMP_RULES.multiMatch={};
  if(!COMP_RULES.multiMatch[dk])COMP_RULES.multiMatch[dk]={};
  const vals=val.split(/[,|]/).map(s=>s.trim()).filter(s=>s);
  if(vals.length)COMP_RULES.multiMatch[dk][f]=vals;
  else delete COMP_RULES.multiMatch[dk][f];
}
function setDateFresh(dk,f,val){
  if(!COMP_RULES.dateFresh)COMP_RULES.dateFresh={};
  if(!COMP_RULES.dateFresh[dk])COMP_RULES.dateFresh[dk]={};
  const days=parseInt(val);
  if(days>0)COMP_RULES.dateFresh[dk][f]=days;
  else delete COMP_RULES.dateFresh[dk][f];
}
// Get current rule type for a field: returns {type, value}
function getFieldRuleType(dk,f){
  if((COMP_RULES.latestFW||{})[f]!==undefined)return{type:'fw',value:COMP_RULES.latestFW[f]};
  if((COMP_RULES.exactMatch?.[dk]||{})[f]!==undefined)return{type:'exact',value:COMP_RULES.exactMatch[dk][f]};
  if((COMP_RULES.multiMatch?.[dk]||{})[f])return{type:'multi',value:(COMP_RULES.multiMatch[dk][f]||[]).join(', ')};
  if((COMP_RULES.dateFresh?.[dk]||{})[f])return{type:'date_fresh',value:String(COMP_RULES.dateFresh[dk][f])};
  if((COMP_RULES.requiredChecks?.[dk]||[]).includes(f))return{type:'checkbox',value:''};
  if((COMP_RULES.requiredFields?.[dk]||[]).includes(f))return{type:'required',value:''};
  if((COMP_RULES.requiredECN?.[dk]||[]).includes(f))return{type:'ecn_required',value:''};
  return{type:'none',value:''};
}

// Clear all rules for a field
function clearFieldRule(dk,f){
  if(COMP_RULES.latestFW?.[f])delete COMP_RULES.latestFW[f];
  if(COMP_RULES.exactMatch?.[dk]?.[f]!==undefined)delete COMP_RULES.exactMatch[dk][f];
  if(COMP_RULES.multiMatch?.[dk]?.[f])delete COMP_RULES.multiMatch[dk][f];
  if(COMP_RULES.dateFresh?.[dk]?.[f])delete COMP_RULES.dateFresh[dk][f];
  ['requiredChecks','requiredFields','requiredECN'].forEach(k=>{
    if(COMP_RULES[k]?.[dk]){
      const i=COMP_RULES[k][dk].indexOf(f);
      if(i>=0)COMP_RULES[k][dk].splice(i,1);
    }
  });
}

// Set a rule type for a field (clears old one first)
function setFieldRuleType(dk,f,type){
  console.log('[RULE] Setting',dk,f,'→',type);
  console.log('[RULE] Before clear:',JSON.stringify({
    reqECN:COMP_RULES.requiredECN?.[dk],
    dateFresh:COMP_RULES.dateFresh?.[dk],
    exact:COMP_RULES.exactMatch?.[dk]
  }));
  clearFieldRule(dk,f);
  console.log('[RULE] After clear:',JSON.stringify({
    reqECN:COMP_RULES.requiredECN?.[dk],
    dateFresh:COMP_RULES.dateFresh?.[dk]
  }));
  switch(type){
    case'checkbox':
      if(!COMP_RULES.requiredChecks)COMP_RULES.requiredChecks={};
      if(!COMP_RULES.requiredChecks[dk])COMP_RULES.requiredChecks[dk]=[];
      COMP_RULES.requiredChecks[dk].push(f);break;
    case'required':
      if(!COMP_RULES.requiredFields)COMP_RULES.requiredFields={};
      if(!COMP_RULES.requiredFields[dk])COMP_RULES.requiredFields[dk]=[];
      COMP_RULES.requiredFields[dk].push(f);break;
    case'ecn_required':
      if(!COMP_RULES.requiredECN)COMP_RULES.requiredECN={};
      if(!COMP_RULES.requiredECN[dk])COMP_RULES.requiredECN[dk]=[];
      COMP_RULES.requiredECN[dk].push(f);break;
    case'exact':
      if(!COMP_RULES.exactMatch)COMP_RULES.exactMatch={};
      if(!COMP_RULES.exactMatch[dk])COMP_RULES.exactMatch[dk]={};
      COMP_RULES.exactMatch[dk][f]='';break;
    case'multi':
      if(!COMP_RULES.multiMatch)COMP_RULES.multiMatch={};
      if(!COMP_RULES.multiMatch[dk])COMP_RULES.multiMatch[dk]={};
      COMP_RULES.multiMatch[dk][f]=[];break;
    case'date_fresh':
      if(!COMP_RULES.dateFresh)COMP_RULES.dateFresh={};
      if(!COMP_RULES.dateFresh[dk])COMP_RULES.dateFresh[dk]={};
      COMP_RULES.dateFresh[dk][f]=60;break;
    case'fw':
      if(!COMP_RULES.latestFW)COMP_RULES.latestFW={};
      COMP_RULES.latestFW[f]='';break;
  }
  console.log('[RULE] After set:',type,JSON.stringify(getFieldRuleType(dk,f)));
  render();
}

function openBatch(){
  // Clear legacy bulk edit data
  localStorage.removeItem('bulkSel');localStorage.removeItem('bulkDK');
  let raw=[];
  try{raw=JSON.parse(localStorage.getItem('batchUnits')||'[]');}catch(e){raw=[];}
  S.batchUnits=Array.isArray(raw)?raw.filter(u=>u&&typeof u==='object'&&typeof u.ghostSN==='string'&&u.ghostSN&&!u.ghostSN.includes('[object')):[];
  if(raw.length!==S.batchUnits.length)saveBatchUnits();
  S.batchTrees={};S.batchTab=null;
  S.batchStep=S.batchUnits.length?2:1;
  S.batchType=null;S.batchNumInput='';
  rebuildBatchTrees();
  S.screen='batch';render();
}

function rebuildBatchTrees(){
  S.batchTrees={};
  for(const u of S.batchUnits){
    try{
      if(!u.ghostSN||typeof u.ghostSN!=='string')continue;
      if(!S.batchTrees[u.ghostSN]){
        const ghostRow=findRowBySN(DATA.ghosts,u.ghostSN);
        if(ghostRow)S.batchTrees[u.ghostSN]=getGhostTree(ghostRow);
      }
    }catch(e){console.warn('[Batch] Error building tree for',u.ghostSN,e);}
  }
}

function batchAddUnit(){
  const raw=S.batchNumInput.trim();
  if(!raw)return;
  const chip=S.batchType?CHIPS.find(c=>c.id===S.batchType):null;

  // Build search inputs from number(s)
  const parts=raw.split(/[,\s]+/).filter(s=>s.trim());
  let added=0,dupes=0,notFound=0;

  for(const part of parts){
    let searchStr;
    if(chip){
      // Chip selected: build "PREFIX-number"
      searchStr=chip.id==='GALINA'?part.trim():`${chip.short}-${part.trim()}`;
    } else {
      // No chip: treat as full S/N
      searchStr=part.trim();
    }

    const result=traceToGhost(searchStr);
    if(!result){notFound++;showToast(`No match for "${searchStr}"`,'error');continue;}
    const ghostSN=getRowSN(result.ghost,DATA.ghosts);
    if(!ghostSN){notFound++;showToast(`Can't find ghost S/N for "${searchStr}"`,'error');continue;}
    if(S.batchUnits.some(u=>u.ghostSN===ghostSN)){dupes++;continue;}
    S.batchUnits.push({chipId:S.batchType||'',inputSN:searchStr,sn:result.matchedSN||searchStr,ghostSN});
    added++;
  }

  S.batchNumInput='';
  if(added){saveBatchUnits();rebuildBatchTrees();}
  if(dupes&&added)showToast(`${added} added, ${dupes} already added`);
  else if(dupes)showToast(`${dupes} already added`);
  else if(added)showToast(`${added} ghost${added>1?'s':''} added`);
  render();
}

function batchRemoveUnit(idx){
  S.batchUnits.splice(idx,1);
  saveBatchUnits();rebuildBatchTrees();render();
}

function batchClearAll(){
  S.batchUnits=[];S.batchTrees={};S.batchTab=null;S.batchStep=1;
  saveBatchUnits();render();
}

function saveBatchUnits(){
  localStorage.setItem('batchUnits',JSON.stringify(S.batchUnits));
}

function getBatchTabItems(tabKey){
  const tab=BATCH_TABS.find(t=>t.k===tabKey);
  if(!tab)return[];
  const items=[];
  for(const tree of Object.values(S.batchTrees)){
    const d=tree[tab.tk];
    if(d){
      if(Array.isArray(d))items.push(...d);
      else items.push(d);
    }
  }
  return items;
}

        <span style="font-size:10px;color:var(--t4)">Enter number(s) ↓</span>
      </div>
      <div style="display:flex;gap:8px">
        ${chip.short?`<div style="padding:12px 16px;border-radius:12px;background:${chip.color}15;border:1px solid ${chip.color}33;color:${chip.color};font-family:var(--fm);font-size:18px;font-weight:700;white-space:nowrap">${chip.short}-</div>`:''}
        <input class="sch-in" id="batchNumIn" type="text" inputmode="numeric" value="${escA(S.batchNumInput)}" placeholder="${chip.id==='GALINA'?'240002...':'29, 35, 42...'}" style="font-size:20px;text-align:center;letter-spacing:2px" autocomplete="off">
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn1" style="flex:1" onclick="batchAddUnit()">Add ⏎</button>
        <button class="btn btn3" onclick="S.batchType=null;S.batchNumInput='';render()">✕ Clear</button>
      </div>
    </div>`;
  } else {
    h+=`<div style="width:100%;max-width:420px;margin-bottom:12px">
      <div style="font-size:10px;color:var(--t5);font-weight:600;letter-spacing:1px;margin-bottom:6px">OR ENTER FULL S/N</div>
      <input class="sch-in" id="batchNumIn" value="${escA(S.batchNumInput)}" placeholder="GT418-GST-00001 or full S/N..." autocomplete="off" spellcheck="false">
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn1" style="flex:1" onclick="batchAddUnit()">Add ⏎</button>
      </div>
    </div>`;
  }

  // Added units list
  if(S.batchUnits.length){
    h+=`<div style="width:100%;max-width:420px">`;
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:10px;color:var(--t5);font-weight:600;letter-spacing:1px">${S.batchUnits.length} GHOST${S.batchUnits.length>1?'S':''} SELECTED</div>
      <button style="padding:4px 10px;border-radius:5px;font-size:9px;font-weight:600;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.06);color:#f87171;cursor:pointer" onclick="batchClearAll()">Clear all</button>
    </div>`;

    S.batchUnits.forEach((u,idx)=>{
      const chipInfo=u.chipId?CHIPS.find(c=>c.id===u.chipId):null;
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:4px;border-radius:8px;background:var(--card);border:1px solid var(--bd)">
        <span style="font-size:14px">👻</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600;color:var(--t1);font-family:var(--fm)">${esc(u.ghostSN)}</div>
          <div style="font-size:10px;color:var(--t4)">via ${chipInfo?.icon||'🔍'} ${esc(u.inputSN||u.sn||'')}</div>
        </div>
        <button style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.06);color:#f87171;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center" onclick="batchRemoveUnit(${idx})">✕</button>
      </div>`;
    });

    h+=`<button class="savb savA" style="width:100%;margin-top:16px;min-height:48px;font-size:14px;touch-action:manipulation" onclick="S.batchStep=2;render()">
      Review ${S.batchUnits.length} Ghost${S.batchUnits.length>1?'s':''} →
    </button>`;
    h+=`</div>`;
  } else {
    h+=`<div style="text-align:center;padding:40px 20px;color:var(--t5)">
      <div style="font-size:32px;margin-bottom:12px">📋</div>
      <div style="font-size:13px">Add units to begin ECN review</div>
      <div style="font-size:11px;color:var(--t6);margin-top:6px">Pick a unit type above, then enter numbers</div>
    </div>`;
  }

  return h;
}

function rBatchDashboard(){
  let h='';

  // Summary bar
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:13px;font-weight:600;color:var(--t2)">${S.batchUnits.length} Ghost${S.batchUnits.length>1?'s':''}</div>
    <button style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:var(--card);color:var(--t3);cursor:pointer" onclick="S.batchStep=1;render()">✏️ Edit units</button>
  </div>`;

  // Tab strip with issue counts
  const availTabs=BATCH_TABS.filter(t=>getBatchTabItems(t.k).length>0);
  if(!S.batchTab||!availTabs.find(t=>t.k===S.batchTab)){
    S.batchTab=availTabs[0]?.k||null;
  }

  h+=`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px">`;
  availTabs.forEach(t=>{
    const items=getBatchTabItems(t.k);
    const sel=S.batchTab===t.k;
    const dk=t.dk;
    let issues=0;
    items.forEach(item=>{
      Object.keys(item).forEach(f=>{if(f==='_rowIdx')return;if(checkFieldComp(dk,f,item[f]))issues++;});
    });
    h+=`<div style="padding:6px 10px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:5px;border:${sel?'2px solid '+t.color:'1px solid var(--bd)'};background:${sel?t.color+'12':'var(--card)'};transition:all .12s" onclick="S.batchTab='${t.k}';render()">
      <span style="font-size:14px">${t.icon}</span>
      <span style="font-size:11px;font-weight:700;color:${sel?t.color:'var(--t3)'}">${t.label}</span>
      <span style="font-size:10px;color:var(--t5)">${items.length}</span>
      ${issues?`<span style="min-width:18px;height:18px;border-radius:9px;background:var(--red);color:#fff;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;padding:0 4px;animation:pulse 2s infinite">⚠${issues}</span>`:''}
    </div>`;
  });
  h+=`</div>`;

  // Selected tab content
  const selTab=availTabs.find(t=>t.k===S.batchTab);
  if(selTab){
    const items=getBatchTabItems(selTab.k);
    const dk=selTab.dk;
    const sk=selTab.k;
    const sf=getSNField(DATA[dk]||items);

    items.forEach((item,idx)=>{
      const itemSN=item[sf]||`Unit ${idx+1}`;

      // Find parent ghost
      let parentGhost='';
      for(const[gsn,tree]of Object.entries(S.batchTrees)){
        const d=tree[selTab.tk];
        const arr=Array.isArray(d)?d:[d];
        if(arr.includes(item)){parentGhost=gsn;break;}
      }
      const ghostNum=(parentGhost.match(/(\d+)$/)||[])[1]||parentGhost;

      // Count issues for this unit
      let unitIssues=0;
      const chkF=[...Object.keys(item).filter(f=>f!=='_rowIdx'&&!shouldSkipField(f)),...Object.keys(item).filter(f=>f!=='_rowIdx'&&isECNField(f))];
      chkF.forEach(f=>{if(checkFieldComp(dk,f,item[f]))unitIssues++;});

      h+=`<div style="margin-bottom:10px;border:1px solid ${unitIssues?'rgba(248,113,113,.35)':'var(--bd)'};border-radius:10px;overflow:hidden;background:var(--card);${unitIssues?'box-shadow:0 0 12px rgba(248,113,113,.08)':''}">`;

      // Unit header with issue badge
      h+=`<div style="padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bd);background:${unitIssues?'rgba(248,113,113,.04)':selTab.color+'08'}">
        <span style="font-size:16px">${selTab.icon}</span>
        <span style="font-size:14px;font-weight:700;color:${selTab.color};font-family:var(--fm)">${esc(itemSN)}</span>
        <span style="font-size:10px;color:var(--t4)">👻 ${esc(ghostNum)}</span>
        ${unitIssues?
          `<span style="margin-left:auto;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)">⚠️ ${unitIssues} issue${unitIssues>1?'s':''}</span>`:
          `<span style="margin-left:auto;font-size:11px;font-weight:600;color:var(--grn)">✓ OK</span>`}
      </div>`;

      h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd)">`;
      const fields=Object.keys(item).filter(f=>f!=='_rowIdx'&&!shouldSkipField(f));
      const ecnFields=Object.keys(item).filter(f=>f!=='_rowIdx'&&isECNField(f));
      const allFields=[...fields,...ecnFields];
      allFields.forEach(f=>{
        const val=item[f]||'';
        const label=FIELD_LABELS[f]||f;
        const isECN=isECNField(f);
        const vRule=getV(sk,f);
        const editable=isFieldEditable(dk,f);
        const isSN=f===sf||/S\/N$/i.test(f);
        const compIssue=checkFieldComp(dk,f,val);
        const eid=editable?regEdit(sk,itemSN,f,val):null;

        let valColor='var(--t1)';
        let bgColor='var(--card)';
        if(compIssue)bgColor='rgba(248,113,113,.06)';
        else if(isECN)bgColor='rgba(91,110,234,.04)';
        if(!val)valColor='var(--t6)';
        if(isSN)valColor=selTab.color;

        let displayVal=val;
        const ruleInfo=getFieldRuleType(dk,f);
        const effType=ruleInfo.type==='date_fresh'?'date':ruleInfo.type==='checkbox'?'checkbox':vRule?.type||(isECN?guessECNType(sk,f)?.type:null);
        if(effType==='checkbox'||(!effType&&isECN&&/^(TRUE|FALSE|true|false|1|0|OK|✓|✗|done|no|)$/i.test(val))){
          const pass=/^(TRUE|true|1|OK|✓|done)$/i.test(val);
          const fail=/^(FALSE|false|0|✗|no)$/i.test(val);
          if(pass)displayVal='✓';
          else if(fail)displayVal='✗';
          valColor=pass?'var(--grn)':fail?'var(--red)':'var(--t5)';
        }

        // Date age badge
        let dateBadge='';
        if(ruleInfo.type==='date_fresh'&&val){
          const d=new Date(val.replace(/\//g,'-'));
          if(!isNaN(d.getTime())){
            const days=Math.floor((new Date()-d)/(1000*60*60*24));
            const maxD=parseInt(ruleInfo.value)||60;
            const overdue=days>maxD;
            dateBadge=`<span style="font-size:7px;padding:1px 4px;border-radius:3px;background:${overdue?'rgba(248,113,113,.15)':'rgba(52,211,153,.12)'};color:${overdue?'var(--red)':'var(--grn)'};font-weight:700">${days}d${overdue?' ⚠️':''}</span>`;
          }
        }

        // Warning reason tag
        let warnTag='';
        if(compIssue){
          warnTag=`<span style="font-size:7px;padding:1px 4px;border-radius:3px;background:rgba(248,113,113,.12);color:var(--red);font-weight:700">⚠️ ${esc(compIssue)}</span>`;
        }

        h+=`<div style="padding:8px 12px;background:${bgColor};${editable?'cursor:pointer':''}${compIssue?';border-left:3px solid var(--red)':''}" ${editable?`onclick="doEdit(${eid})"`:''}">
          <div style="font-size:10px;color:var(--t4);margin-bottom:3px;display:flex;align-items:center;gap:3px;flex-wrap:wrap">
            ${esc(label)}
            ${editable?'<span style="font-size:8px;color:var(--ac)">✎</span>':''}
            ${isECN?'<span style="font-size:6px;padding:1px 3px;border-radius:2px;background:var(--ac);color:#fff;font-weight:700">ECN</span>':''}
            ${dateBadge}
            ${warnTag}
          </div>
          <div style="font-size:13px;font-family:${isSN?'var(--fm)':'inherit'};color:${valColor};font-weight:${isSN||effType==='checkbox'?'700':'500'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${displayVal?esc(displayVal):'<span style="color:var(--t5);font-style:italic">—</span>'}</div>
        </div>`;
      });
      h+=`</div></div>`;
    });
  }

  return h;
}


// Utility: find S/N by trailing number
function findSNByNum(dk,num){
  const rows=DATA[dk]||[];const sf=getSNField(rows);
  const r=rows.find(r=>{const m=(r[sf]||'').match(/(\d+)$/);return m&&parseInt(m[1])===num;});
  return r?r[sf]:null;
}

// Motor S/N lookup
function getMotorLookupDK(field){
  if(/^l\d+\s*motor/i.test(field))return 'lMotors';
  if(/^a[12]\s*motor/i.test(field))return 'a12Motors';
  if(/^a[35]\s*motor/i.test(field))return 'a35Motors';
  if(/^a4\s*motor/i.test(field))return 'a4Motors';
  return null;
}

function lookupMotorSN(lookupDK,num){
  const rows=DATA[lookupDK]||[];
  if(!rows.length)return null;
  const sf=getSNField(rows);
  const n=parseInt(num);
  if(isNaN(n)||n<1)return null;
  const match=rows.find(r=>{
    const m=(r[sf]||'').match(/(\d+)$/);
    return m&&parseInt(m[1])===n;
  });
  return match?match[sf]:null;
}

async function doRefresh(){S.refreshing=true;render();S.loadErrors=await loadAllData((l,t,c)=>{LP={l,t,c};});S.refreshing=false;showToast('Data refreshed');render();}
function showToast(msg,type='success'){S.toast={msg,type};render();const dur=msg.includes('→')?5000:3000;clearTimeout(S._toastT);S._toastT=setTimeout(()=>{S.toast=null;render();},dur);}



</script>
